apiVersion: apps/v1
kind: Deployment
metadata:
    name: backend-deployment
spec:
    replicas: 3

    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0

    selector:
        matchLabels:
            app: backend-test

    template:
        metadata:
            labels:
                app: backend-test
        spec:
            containers:
                - name: backend-test-cont
                  image: manhduwcs/backend-test
                  ports:
                      - containerPort: 4321

                  resources:
                      limits:
                          cpu: "500m"
                          memory: "512Mi"
                      requests:
                          cpu: "500m"
                          memory: "512Mi"

                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: 4321
                      initialDelaySeconds: 10
                      periodSeconds: 5

                  readinessProbe:
                      httpGet:
                          path: /ready
                          port: 4321

---
apiVersion: v1
kind: Service
metadata:
    name: backend-service
spec:
    type: ClusterIP
    ports:
        port: 5555
        targetPort: 4321
    selector:
        app: backend-test
